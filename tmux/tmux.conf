# terminal
set-option -g default-terminal "tmux-256color"
set-option -a terminal-features 'xterm-ghostty:RGB'
set-option -g focus-events on
# let terminal graphics (kitty protocol, e.g. presenterm images) pass through tmux
set-option -g allow-passthrough on

# general
set-option -g mouse on
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g escape-time 0
set-option -g status-interval 2
set-option -g display-panes-time 4000
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
set -g extended-keys on
if-shell -b '[ "$(tmux -V | sed "s/[^0-9.]//g")" \> "3.3" ]' \
    'set -s extended-keys-format csi-u'

# splitting
bind '"' split-window -h -c "#{pane_current_path}"
bind % split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# session picker sorted by time
bind s choose-tree -Zs -O time

# theme (generated by nix)
source-file ~/dotfiles/tmux/theme.conf
