name: update-locks

# Weekly bump of both lockfiles, committed to main ONLY if every check passes:
#   - flake.lock  (nix inputs)
#   - nvim/lazy-lock.json (neovim plugins), validated by `Lazy! sync`
# Validation is split by platform because the configs can't all be evaluated on
# one OS: the darwin/mac-home configs import-from-derivation into aarch64-darwin
# builds (and the reverse for the Linux configs). So Linux configs are checked
# on ubuntu and darwin/mac-home configs on a native macOS runner, both against
# the SAME updated lock (passed as an artifact). Public repo → Actions minutes
# (incl. macOS) are free. A red run commits nothing and GitHub emails it.

on:
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: update-locks
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # Bump the locks, validate the Linux-native configs + neovim plugins, and
  # publish the updated lockfiles so the darwin check and the commit reuse the
  # exact same lock.
  check-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Update flake.lock
        run: nix flake update

      - name: Evaluate Linux configurations
        run: |
          set -euo pipefail
          for attr in \
            nixosConfigurations.main.config.system.build.toplevel \
            homeConfigurations.scott-linux.activationPackage; do
            echo "::group::eval $attr"
            nix eval ".#$attr.drvPath" --raw > /dev/null
            echo "::endgroup::"
          done

      - name: Update and verify neovim plugins
        run: |
          set -euo pipefail
          # Point neovim at the repo's config; keep data/state/cache in temp so
          # the only file touched in the tree is nvim/lazy-lock.json.
          export XDG_CONFIG_HOME="$RUNNER_TEMP/xdg-config"
          export XDG_DATA_HOME="$RUNNER_TEMP/xdg-data"
          export XDG_STATE_HOME="$RUNNER_TEMP/xdg-state"
          export XDG_CACHE_HOME="$RUNNER_TEMP/xdg-cache"
          mkdir -p "$XDG_CONFIG_HOME"
          ln -sfn "$GITHUB_WORKSPACE/nvim" "$XDG_CONFIG_HOME/nvim"
          # `Lazy! sync` updates every plugin to its latest allowed revision,
          # rewrites lazy-lock.json, and runs each plugin's build step; it exits
          # non-zero (failing the job) if any install or build fails.
          nix shell \
            nixpkgs#neovim nixpkgs#git nixpkgs#gcc nixpkgs#gnumake \
            nixpkgs#nodejs nixpkgs#tree-sitter nixpkgs#ripgrep nixpkgs#fd \
            nixpkgs#curl nixpkgs#unzip \
            --command nvim --headless "+Lazy! sync" +qa

      - name: Publish updated lockfiles
        uses: actions/upload-artifact@v4
        with:
          name: locks
          path: |
            flake.lock
            nvim/lazy-lock.json
          include-hidden-files: true
          retention-days: 1

  # Validate the darwin + mac-home configs on a native macOS runner, against the
  # exact flake.lock produced above.
  check-darwin:
    needs: check-linux
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Use the updated lock from check-linux
        uses: actions/download-artifact@v4
        with:
          name: locks

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Evaluate darwin configurations
        run: |
          set -euo pipefail
          for attr in \
            darwinConfigurations.personal.system \
            darwinConfigurations.work.system \
            homeConfigurations.scott-mac-personal.activationPackage \
            homeConfigurations.scott-mac-work.activationPackage; do
            echo "::group::eval $attr"
            nix eval ".#$attr.drvPath" --raw > /dev/null
            echo "::endgroup::"
          done

  # Commit the validated lockfiles — reached only if both checks passed.
  commit:
    needs: [check-linux, check-darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Restore the validated lockfiles
        uses: actions/download-artifact@v4
        with:
          name: locks

      - name: Commit bumped locks
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          changed=0
          if ! git diff --quiet flake.lock; then
            git add flake.lock
            git commit -m "flake.lock: weekly input bump"
            changed=1
          fi
          if ! git diff --quiet nvim/lazy-lock.json; then
            git add nvim/lazy-lock.json
            git commit -m "nvim: weekly plugin bump (lazy-lock.json)"
            changed=1
          fi
          if [ "$changed" = 1 ]; then
            git push origin HEAD:main
          else
            echo "No lock changes this week."
          fi
